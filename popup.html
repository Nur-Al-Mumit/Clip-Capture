<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: linear-gradient(135deg, #ff4b2b, #ff416c);
            --bg: #1c1c1e;
            --surface: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
        }

        body {
            width: 280px;
            margin: 0;
            padding: 20px;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            text-align: center;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-icon {
            font-size: 24px;
            filter: drop-shadow(0 0 8px rgba(255, 75, 43, 0.5));
        }

        h1 {
            font-size: 16px;
            font-weight: 700;
            margin: 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(46, 213, 115, 0.15);
            color: #2ed573;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            width: fit-content;
            margin: 0 auto;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #2ed573;
            border-radius: 50%;
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(46, 213, 115, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(46, 213, 115, 0); }
            100% { box-shadow: 0 0 0 0 rgba(46, 213, 115, 0); }
        }

        .hint-box {
            background: var(--surface);
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .hint {
            font-size: 13px;
            color: var(--text-dim);
            line-height: 1.5;
            margin: 0;
        }

        .hint b {
            color: var(--text-main);
        }

        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 4px;
        }

        .feature-tag {
            font-size: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            padding: 6px;
            color: var(--text-dim);
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .footer {
            margin-top: 8px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.2);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="logo-icon">🎬</span>
            <h1>Pure Capture</h1>
        </div>

        <div class="status-badge">
            <span class="status-dot"></span>
            ENGINE READY
        </div>

        <div class="hint-box">
            <p class="hint">Open any <b>YouTube video</b>. The capture panel will appear in the <b>right sidebar</b> automatically.</p>
        </div>

        <div class="features">
            <div class="feature-tag">1080p Quality</div>
            <div class="feature-tag">Local Only</div>
            <div class="feature-tag">MP4/MP3</div>
            <div class="feature-tag">No Login</div>
        </div>

        <div class="footer">
            v6.0 • PRIVACY FOCUSED LOCAL ENGINE
        </div>
    </div>
</body>
</html>
